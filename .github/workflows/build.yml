name: Build & Deploy Water Polo Tracker

on:
  schedule:
    - cron: '17 */4 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_rosters:
        description: 'Re-fetch all team rosters from API'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}

    steps:
      - name: Compute build gate (Python)
        id: gate
        run: |
          python - << 'EOF'
          import hashlib, datetime, os

          if os.environ.get("GITHUB_EVENT_NAME") != "schedule":
              print("proceed=true")
              exit(0)

          date_str = datetime.datetime.utcnow().strftime("%Y%m%d")

          h = hashlib.md5(date_str.encode()).hexdigest()
          target = int(h[:8], 16) % 6

          slot = 0  # single execution slot per day

          print("proceed=" + ("true" if slot == target else "false"))
          EOF

  build:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 📦 Python setup + cache
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ⚡ Node setup + cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Build site
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.refresh_rosters || 'false' }}" = "true" ]; then
            python build.py --refresh-rosters
          else
            python build.py
          fi

      # 💾 Commit només si hi ha canvis reals
      - name: Commit cache (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A _data/seasons/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update season cache [skip ci]"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
