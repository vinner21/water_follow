name: Build & Deploy Water Polo Tracker

on:
  schedule:
    - cron: '17 */4 * * *'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      refresh_rosters:
        description: 'Re-fetch all team rosters from API'
        required: false
        type: boolean
        default: false
      force_run:
        description: 'Force the workflow to run immediately when manually dispatched'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}

    steps:
      - name: Compute build gate (Python)
        id: gate
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
        run: |
          python - << 'EOF'
          import hashlib, datetime, os, sys

          event_name = os.environ.get("GITHUB_EVENT_NAME")
          force_run = os.environ.get("FORCE_RUN", "false").lower() == "true"
          github_output = os.environ.get("GITHUB_OUTPUT")

          def set_output(name, value):
              if github_output:
                  with open(github_output, "a") as f:
                      f.write(f"{name}={value}\n")
              else:
                  print(f"::error::GITHUB_OUTPUT is not set")
                  sys.exit(1)

          if event_name == "workflow_dispatch":
              set_output("proceed", "true" if force_run else "false")
              print(f"event=workflow_dispatch force_run={force_run}")
              sys.exit(0)

          if event_name != "schedule":
              set_output("proceed", "true")
              sys.exit(0)

          current_hour = datetime.datetime.utcnow().hour
          slot = current_hour // 4

          date_str = datetime.datetime.utcnow().strftime("%Y%m%d")
          h = hashlib.md5(date_str.encode()).hexdigest()
          target_slot = int(h[:8], 16) % 6

          set_output("proceed", "true" if slot == target_slot else "false")
          print(f"schedule slot={slot} target={target_slot}")
          EOF

  build:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 📦 Python setup + cache
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ⚡ Node setup + cache
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Build site
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ "${{ github.event.inputs.refresh_rosters || 'false' }}" = "true" ]; then
            python build.py --refresh-rosters
          else
            python build.py
          fi

      # 💾 Commit només si hi ha canvis reals
      - name: Commit cache (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A _data/seasons/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update season cache [skip ci]"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
